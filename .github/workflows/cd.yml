name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: cloudforge-api
  CLUSTER_NAME: cloudforge-eks

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Determine Version
        id: versioning
        run: |
          # Lấy thông tin từ workflow CI vừa chạy
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"

          # Nếu head_branch bắt đầu bằng 'v', đó là một Tag
          if [[ "$HEAD_BRANCH" =~ ^v[0-9] ]]; then
            VERSION="$HEAD_BRANCH"
          else
            VERSION="sha-$(echo $HEAD_SHA | cut -c1-7)"
          fi
          echo "APP_VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: AWS creds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          APP_VERSION=${{ steps.versioning.outputs.APP_VERSION }}
          # Chỉ build 1 lần với 2 tag: tag version và tag latest
          docker build -t $REGISTRY/$ECR_REPOSITORY:$APP_VERSION \
                       -t $REGISTRY/$ECR_REPOSITORY:latest \
                       -f docker/Dockerfile .
          docker push $REGISTRY/$ECR_REPOSITORY --all-tags

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
          --region $AWS_REGION \
          --name $CLUSTER_NAME

      - name: Deploy
        run: |
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          APP_VERSION=${{ steps.versioning.outputs.APP_VERSION }}
          # Cập nhật image tag và biến môi trường VERSION trong manifest
          sed -i "s|image:.*|image: $REGISTRY/$ECR_REPOSITORY:$APP_VERSION|g" k8s/deployment.yaml
          sed -i "/name: VERSION/{n;s|value:.*|value: \"$APP_VERSION\"|}" k8s/deployment.yaml
          kubectl apply -f k8s/